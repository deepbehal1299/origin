name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run -w frontend lint

      - name: Run frontend tests with coverage
        run: npm run -w frontend test:coverage

      - name: Build frontend
        run: npm run -w frontend build
